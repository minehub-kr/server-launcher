name: Test Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: 22
  PNPM_VERSION: 10

jobs:
  test-build:
    name: Test build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-22.04
            artifact: linux
          - name: macOS
            os: macos-latest
            artifact: macos
          - name: Windows
            os: windows-latest
            artifact: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build frontend
        run: pnpm run build

      - name: Check Rust format
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test --locked

      - name: Build Tauri app
        run: pnpm run tauri:build

      - name: Upload test build output
        uses: actions/upload-artifact@v4
        with:
          name: test-build-${{ matrix.artifact }}
          if-no-files-found: warn
          retention-days: 7
          path: |
            src-tauri/target/release/minehub-server-launcher
            src-tauri/target/release/minehub-server-launcher.exe
            src-tauri/target/release/bundle/**
